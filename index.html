<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spinning Top</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #000; }
    canvas { display: block; }
    #cursor-dot {
      position: fixed;
      width: 8px;
      height: 8px;
      background: rgba(255, 160, 50, 0.8);
      transform: translate(-50%, -50%) rotate(45deg);
      pointer-events: none;
      z-index: 100;
    }
    #vignette {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      pointer-events: none;
      background: radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.7) 100%);
      z-index: 10;
    }
  </style>
</head>
<body>
  <div id="cursor-dot"></div>
  <div id="vignette"></div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
  }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
    import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
    import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

    // ── Scene Setup ──
    const scene = new THREE.Scene();
    scene.fog = new THREE.FogExp2(0x000508, 0.035);

    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(0, 3, 8);
    camera.lookAt(0, 1, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.2;
    document.body.appendChild(renderer.domElement);

    // ── Post-processing ──
    const composer = new EffectComposer(renderer);
    composer.addPass(new RenderPass(scene, camera));
    const bloomPass = new UnrealBloomPass(
      new THREE.Vector2(window.innerWidth, window.innerHeight),
      1.8,   // strength
      0.4,   // radius
      0.2    // threshold
    );
    composer.addPass(bloomPass);

    // ── Lighting ──
    const ambientLight = new THREE.AmbientLight(0x111122, 0.3);
    scene.add(ambientLight);

    const mainLight = new THREE.PointLight(0xff8030, 8, 15, 1.5);
    mainLight.position.set(0, 3.5, 0);
    scene.add(mainLight);

    const accentLight = new THREE.PointLight(0x4444ff, 3, 10, 2);
    accentLight.position.set(-2, 0.5, 2);
    scene.add(accentLight);

    const rimLight = new THREE.PointLight(0xff6020, 4, 12, 1.5);
    rimLight.position.set(2, 1, -3);
    scene.add(rimLight);

    // ── Ground Plane ──
    const groundGeo = new THREE.PlaneGeometry(40, 40);
    const groundMat = new THREE.MeshStandardMaterial({
      color: 0x050508,
      metalness: 0.95,
      roughness: 0.3,
    });
    const ground = new THREE.Mesh(groundGeo, groundMat);
    ground.rotation.x = -Math.PI / 2;
    ground.position.y = 0;
    scene.add(ground);

    // ── Spinning Top Geometry (LatheGeometry) ──
    const topGroup = new THREE.Group();
    scene.add(topGroup);

    // Profile points for the spinning top silhouette
    const points = [];
    // Bottom tip (sharp point)
    points.push(new THREE.Vector2(0, 0));
    points.push(new THREE.Vector2(0.02, 0.05));
    points.push(new THREE.Vector2(0.06, 0.15));
    // Curve outward to the disc
    points.push(new THREE.Vector2(0.15, 0.35));
    points.push(new THREE.Vector2(0.35, 0.55));
    points.push(new THREE.Vector2(0.55, 0.7));
    points.push(new THREE.Vector2(0.7, 0.8));
    points.push(new THREE.Vector2(0.8, 0.88));
    points.push(new THREE.Vector2(0.82, 0.92));
    // Disc edge (widest part)
    points.push(new THREE.Vector2(0.83, 0.95));
    points.push(new THREE.Vector2(0.82, 0.98));
    // Curve back inward above disc
    points.push(new THREE.Vector2(0.78, 1.02));
    points.push(new THREE.Vector2(0.65, 1.08));
    points.push(new THREE.Vector2(0.45, 1.15));
    points.push(new THREE.Vector2(0.3, 1.22));
    // Neck
    points.push(new THREE.Vector2(0.15, 1.4));
    points.push(new THREE.Vector2(0.1, 1.6));
    points.push(new THREE.Vector2(0.08, 1.9));
    // Stem widening
    points.push(new THREE.Vector2(0.09, 2.2));
    points.push(new THREE.Vector2(0.12, 2.5));
    points.push(new THREE.Vector2(0.15, 2.7));
    // Handle bulge
    points.push(new THREE.Vector2(0.18, 2.85));
    points.push(new THREE.Vector2(0.2, 2.95));
    points.push(new THREE.Vector2(0.2, 3.05));
    points.push(new THREE.Vector2(0.18, 3.15));
    points.push(new THREE.Vector2(0.14, 3.25));
    // Top tip
    points.push(new THREE.Vector2(0.08, 3.35));
    points.push(new THREE.Vector2(0.03, 3.45));
    points.push(new THREE.Vector2(0, 3.5));

    const topGeo = new THREE.LatheGeometry(points, 64);
    const topMat = new THREE.MeshStandardMaterial({
      color: 0xcc6620,
      metalness: 0.92,
      roughness: 0.15,
      envMapIntensity: 2.0,
    });

    // Create a simple environment map for reflections
    const cubeRT = new THREE.WebGLCubeRenderTarget(256);
    const cubeCamera = new THREE.CubeCamera(0.1, 100, cubeRT);
    scene.add(cubeCamera);
    topMat.envMap = cubeRT.texture;

    const topMesh = new THREE.Mesh(topGeo, topMat);
    topMesh.castShadow = true;
    topGroup.add(topMesh);

    // Disc ring detail - a torus at the widest part
    const ringGeo = new THREE.TorusGeometry(0.83, 0.025, 16, 64);
    const ringMat = new THREE.MeshStandardMaterial({
      color: 0xffaa44,
      metalness: 1.0,
      roughness: 0.1,
      emissive: 0xff6600,
      emissiveIntensity: 0.3,
    });
    const ring = new THREE.Mesh(ringGeo, ringMat);
    ring.rotation.x = Math.PI / 2;
    ring.position.y = 0.95;
    topGroup.add(ring);

    // ── Particle System (Spark Trails) ──
    const PARTICLE_COUNT = 300;
    const particleGeo = new THREE.BufferGeometry();
    const positions = new Float32Array(PARTICLE_COUNT * 3);
    const velocities = new Float32Array(PARTICLE_COUNT * 3);
    const lifetimes = new Float32Array(PARTICLE_COUNT);
    const maxLifetimes = new Float32Array(PARTICLE_COUNT);
    const sizes = new Float32Array(PARTICLE_COUNT);

    function resetParticle(i) {
      const angle = Math.random() * Math.PI * 2;
      const r = 0.8 + Math.random() * 0.1;
      positions[i * 3] = Math.cos(angle) * r;
      positions[i * 3 + 1] = 0.9 + Math.random() * 0.2;
      positions[i * 3 + 2] = Math.sin(angle) * r;

      const speed = 0.5 + Math.random() * 2.5;
      const upSpeed = 0.2 + Math.random() * 1.5;
      velocities[i * 3] = Math.cos(angle) * speed + (Math.random() - 0.5) * 0.5;
      velocities[i * 3 + 1] = upSpeed;
      velocities[i * 3 + 2] = Math.sin(angle) * speed + (Math.random() - 0.5) * 0.5;

      maxLifetimes[i] = 0.5 + Math.random() * 1.5;
      lifetimes[i] = maxLifetimes[i];
      sizes[i] = 2 + Math.random() * 6;
    }

    for (let i = 0; i < PARTICLE_COUNT; i++) {
      resetParticle(i);
      lifetimes[i] = Math.random() * maxLifetimes[i]; // stagger initial
    }

    particleGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    particleGeo.setAttribute('size', new THREE.BufferAttribute(sizes, 1));

    // Create spark texture
    const sparkCanvas = document.createElement('canvas');
    sparkCanvas.width = 64;
    sparkCanvas.height = 64;
    const sparkCtx = sparkCanvas.getContext('2d');
    const grad = sparkCtx.createRadialGradient(32, 32, 0, 32, 32, 32);
    grad.addColorStop(0, 'rgba(255, 200, 80, 1)');
    grad.addColorStop(0.2, 'rgba(255, 140, 40, 0.8)');
    grad.addColorStop(0.5, 'rgba(255, 80, 10, 0.3)');
    grad.addColorStop(1, 'rgba(255, 40, 0, 0)');
    sparkCtx.fillStyle = grad;
    sparkCtx.fillRect(0, 0, 64, 64);
    const sparkTexture = new THREE.CanvasTexture(sparkCanvas);

    const particleMat = new THREE.PointsMaterial({
      map: sparkTexture,
      size: 0.15,
      sizeAttenuation: true,
      transparent: true,
      blending: THREE.AdditiveBlending,
      depthWrite: false,
      color: 0xff9930,
    });

    const particles = new THREE.Points(particleGeo, particleMat);
    scene.add(particles);

    // ── Trail Lines (elongated spark streaks) ──
    const trailCount = 40;
    const trails = [];
    const trailGroup = new THREE.Group();
    scene.add(trailGroup);

    for (let i = 0; i < trailCount; i++) {
      const len = 0.3 + Math.random() * 1.2;
      const trailGeo = new THREE.PlaneGeometry(0.02, len);
      const trailMat = new THREE.MeshBasicMaterial({
        color: new THREE.Color().setHSL(0.07 + Math.random() * 0.05, 1.0, 0.5 + Math.random() * 0.3),
        transparent: true,
        opacity: 0.4 + Math.random() * 0.5,
        blending: THREE.AdditiveBlending,
        depthWrite: false,
        side: THREE.DoubleSide,
      });
      const trail = new THREE.Mesh(trailGeo, trailMat);

      const angle = Math.random() * Math.PI * 2;
      const dist = 1.5 + Math.random() * 5;
      trail.position.set(
        Math.cos(angle) * dist,
        0.3 + Math.random() * 3,
        Math.sin(angle) * dist - 2
      );
      trail.rotation.z = angle + Math.PI / 2 + (Math.random() - 0.5) * 0.5;
      trail.userData = {
        angle,
        dist,
        speed: 0.1 + Math.random() * 0.4,
        baseY: trail.position.y,
        phase: Math.random() * Math.PI * 2,
      };
      trailGroup.add(trail);
      trails.push(trail);
    }

    // ── Decorative Orbit Circles (wireframe) ──
    const circleGroup = new THREE.Group();
    circleGroup.position.set(-3.5, 3, 0);
    scene.add(circleGroup);

    const circle1Geo = new THREE.RingGeometry(0.45, 0.48, 64);
    const circle1Mat = new THREE.MeshBasicMaterial({
      color: 0xff8833,
      transparent: true,
      opacity: 0.6,
      side: THREE.DoubleSide,
      blending: THREE.AdditiveBlending,
    });
    const circle1 = new THREE.Mesh(circle1Geo, circle1Mat);
    circleGroup.add(circle1);

    const circle2Geo = new THREE.RingGeometry(0.55, 0.57, 64);
    const circle2Mat = new THREE.MeshBasicMaterial({
      color: 0xff8833,
      transparent: true,
      opacity: 0.4,
      side: THREE.DoubleSide,
      blending: THREE.AdditiveBlending,
    });
    const circle2 = new THREE.Mesh(circle2Geo, circle2Mat);
    circle2.rotation.x = 0.3;
    circle2.rotation.y = 0.5;
    circleGroup.add(circle2);

    // Small orbiting dot
    const dotGeo = new THREE.SphereGeometry(0.04, 8, 8);
    const dotMat = new THREE.MeshBasicMaterial({ color: 0xffaa55 });
    const orbitDot = new THREE.Mesh(dotGeo, dotMat);
    circleGroup.add(orbitDot);

    // ── Cursor Follower ──
    const cursorDot = document.getElementById('cursor-dot');
    let mouseX = 0, mouseY = 0;
    document.addEventListener('mousemove', (e) => {
      mouseX = e.clientX;
      mouseY = e.clientY;
      cursorDot.style.left = mouseX + 'px';
      cursorDot.style.top = mouseY + 'px';
    });

    // ── Reflection pass (simple: render top once for env map) ──
    let envUpdateCounter = 0;

    // ── Animation Loop ──
    const clock = new THREE.Clock();

    function animate() {
      requestAnimationFrame(animate);
      const dt = Math.min(clock.getDelta(), 0.05);
      const elapsed = clock.getElapsedTime();

      // Spinning top rotation
      topGroup.rotation.y += 4.0 * dt;
      // Subtle precession wobble
      topGroup.rotation.x = Math.sin(elapsed * 0.5) * 0.03;
      topGroup.rotation.z = Math.cos(elapsed * 0.7) * 0.03;

      // Camera slow orbit
      const camAngle = elapsed * 0.08;
      camera.position.x = Math.sin(camAngle) * 8;
      camera.position.z = Math.cos(camAngle) * 8;
      camera.position.y = 2.5 + Math.sin(elapsed * 0.15) * 0.5;
      camera.lookAt(0, 1.5, 0);

      // Light flicker
      mainLight.intensity = 8 + Math.sin(elapsed * 3) * 1.5;

      // Update particles
      const posAttr = particleGeo.getAttribute('position');
      for (let i = 0; i < PARTICLE_COUNT; i++) {
        lifetimes[i] -= dt;
        if (lifetimes[i] <= 0) {
          resetParticle(i);
        } else {
          positions[i * 3] += velocities[i * 3] * dt;
          positions[i * 3 + 1] += velocities[i * 3 + 1] * dt;
          positions[i * 3 + 2] += velocities[i * 3 + 2] * dt;
          // Gravity
          velocities[i * 3 + 1] -= 2.0 * dt;
        }
      }
      posAttr.needsUpdate = true;

      // Fade particles globally
      particleMat.opacity = 0.7 + Math.sin(elapsed * 2) * 0.15;

      // Animate trail streaks
      for (const trail of trails) {
        const d = trail.userData;
        d.angle += d.speed * dt;
        trail.position.x = Math.cos(d.angle) * d.dist;
        trail.position.z = Math.sin(d.angle) * d.dist - 2;
        trail.position.y = d.baseY + Math.sin(elapsed + d.phase) * 0.3;
        trail.rotation.z = d.angle + Math.PI / 2;
        trail.material.opacity = (0.3 + Math.sin(elapsed * 2 + d.phase) * 0.3);
      }

      // Animate orbit circles
      circleGroup.rotation.z = elapsed * 0.3;
      const dotAngle = elapsed * 1.2;
      orbitDot.position.x = Math.cos(dotAngle) * 0.46;
      orbitDot.position.y = Math.sin(dotAngle) * 0.46;

      // Update env map occasionally
      envUpdateCounter++;
      if (envUpdateCounter % 30 === 0) {
        topMesh.visible = false;
        ring.visible = false;
        cubeCamera.position.copy(topGroup.position);
        cubeCamera.position.y = 1.5;
        cubeCamera.update(renderer, scene);
        topMesh.visible = true;
        ring.visible = true;
      }

      composer.render();
    }

    animate();

    // ── Resize Handler ──
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
      composer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
