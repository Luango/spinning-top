<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spinning Top Game</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #000; font-family: 'Georgia', serif; }
    canvas { display: block; }
    #cursor-dot {
      position: fixed;
      width: 8px;
      height: 8px;
      background: rgba(255, 160, 50, 0.8);
      transform: translate(-50%, -50%) rotate(45deg);
      pointer-events: none;
      z-index: 100;
    }
    #vignette {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      pointer-events: none;
      background: radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.7) 100%);
      z-index: 10;
    }
    #ui {
      position: fixed;
      bottom: 60px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 20;
      text-align: center;
    }
    #spin-btn {
      padding: 18px 60px;
      font-size: 22px;
      font-family: 'Georgia', serif;
      font-weight: bold;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: #fff;
      background: linear-gradient(135deg, #D4722A, #E88530, #cc6600);
      border: 2px solid rgba(255, 170, 60, 0.6);
      border-radius: 50px;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 0 30px rgba(255, 120, 30, 0.4), inset 0 1px 0 rgba(255,255,255,0.2);
    }
    #spin-btn:hover {
      background: linear-gradient(135deg, #E88530, #ffaa44, #D4722A);
      box-shadow: 0 0 50px rgba(255, 120, 30, 0.7), inset 0 1px 0 rgba(255,255,255,0.3);
      transform: scale(1.05);
    }
    #spin-btn:active { transform: scale(0.97); }
    #spin-btn.hidden { display: none; }
    #result {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 20;
      text-align: center;
      opacity: 0;
      transition: opacity 0.8s ease;
      pointer-events: none;
    }
    #result.visible { opacity: 1; pointer-events: auto; }
    #result-number {
      font-size: 120px;
      font-weight: bold;
      color: #ffaa30;
      text-shadow: 0 0 40px rgba(255, 140, 30, 0.8), 0 0 80px rgba(255, 100, 10, 0.4);
      line-height: 1;
    }
    #result-text {
      font-size: 24px;
      color: rgba(255, 200, 140, 0.9);
      margin-top: 10px;
      letter-spacing: 2px;
    }
    #spin-again-btn {
      margin-top: 30px;
      padding: 14px 45px;
      font-size: 16px;
      font-family: 'Georgia', serif;
      font-weight: bold;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #fff;
      background: linear-gradient(135deg, #D4722A, #E88530);
      border: 2px solid rgba(255, 170, 60, 0.5);
      border-radius: 50px;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 0 20px rgba(255, 120, 30, 0.3);
    }
    #spin-again-btn:hover {
      box-shadow: 0 0 40px rgba(255, 120, 30, 0.6);
      transform: scale(1.05);
    }
  </style>
</head>
<body>
  <div id="cursor-dot"></div>
  <div id="vignette"></div>

  <div id="ui">
    <button id="spin-btn">SPIN</button>
  </div>

  <div id="result">
    <div id="result-number"></div>
    <div id="result-text">is your number</div>
    <button id="spin-again-btn">SPIN AGAIN</button>
  </div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
  }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
    import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
    import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

    // ── UI References ──
    const spinBtn = document.getElementById('spin-btn');
    const resultDiv = document.getElementById('result');
    const resultNumber = document.getElementById('result-number');
    const spinAgainBtn = document.getElementById('spin-again-btn');

    // ── Game State ──
    let gameState = 'idle'; // idle, spinning, slowing, falling, result
    let spinSpeed = 0;
    let targetFallAngle = 0;   // which direction the top falls (radians)
    let fallProgress = 0;      // 0 to 1
    let wobbleAmount = 0.03;
    let spinStartTime = 0;
    let resultShown = false;

    // ── Scene Setup ──
    const scene = new THREE.Scene();
    scene.fog = new THREE.FogExp2(0x0a0a15, 0.018);

    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(0, 6, 7);
    camera.lookAt(0, 1, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.4;
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    document.body.appendChild(renderer.domElement);

    // ── Post-processing ──
    const composer = new EffectComposer(renderer);
    composer.addPass(new RenderPass(scene, camera));
    const bloomPass = new UnrealBloomPass(
      new THREE.Vector2(window.innerWidth, window.innerHeight),
      1.2, 0.5, 0.35
    );
    composer.addPass(bloomPass);

    // ── Lighting (brighter environment) ──
    scene.add(new THREE.AmbientLight(0x222233, 1.5));

    // Soft overhead light to illuminate table and numbers
    const overheadLight = new THREE.PointLight(0xffeedd, 10, 30, 1.2);
    overheadLight.position.set(0, 8, 0);
    scene.add(overheadLight);

    // Main warm key light
    const mainLight = new THREE.PointLight(0xff7020, 10, 20, 1.5);
    mainLight.position.set(1.5, 4, 1);
    scene.add(mainLight);

    // Blue/purple accent
    const accentLight = new THREE.PointLight(0x3322cc, 6, 15, 1.5);
    accentLight.position.set(-3, 2, -1);
    scene.add(accentLight);

    // Warm fill from front
    const fillLight = new THREE.PointLight(0xff8040, 5, 12, 1.5);
    fillLight.position.set(0, 1, 4);
    scene.add(fillLight);

    // Rim light
    const rimLight = new THREE.PointLight(0xff5010, 4, 15, 1.5);
    rimLight.position.set(-1, 1.5, -4);
    scene.add(rimLight);

    // Extra fill light from the side for number readability
    const sideLight = new THREE.PointLight(0xddccaa, 5, 15, 1.5);
    sideLight.position.set(3, 2, 2);
    scene.add(sideLight);

    // ── Floor ──
    const floor = new THREE.Mesh(
      new THREE.PlaneGeometry(50, 50),
      new THREE.MeshStandardMaterial({ color: 0x111118, metalness: 0.5, roughness: 0.6 })
    );
    floor.rotation.x = -Math.PI / 2;
    floor.position.y = -1.5;
    scene.add(floor);

    // ── Table ──
    const tableGroup = new THREE.Group();
    scene.add(tableGroup);

    const tableTopMesh = new THREE.Mesh(
      new THREE.BoxGeometry(5, 0.1, 3.5),
      new THREE.MeshStandardMaterial({ color: 0x3d2010, metalness: 0.15, roughness: 0.55 })
    );
    tableTopMesh.position.y = 0;
    tableGroup.add(tableTopMesh);

    const legGeo = new THREE.CylinderGeometry(0.08, 0.08, 1.5, 12);
    const legMat = new THREE.MeshStandardMaterial({ color: 0x1a0d04, metalness: 0.15, roughness: 0.7 });
    for (const [lx, ly, lz] of [[-2.3,-0.75,-1.5],[2.3,-0.75,-1.5],[-2.3,-0.75,1.5],[2.3,-0.75,1.5]]) {
      const leg = new THREE.Mesh(legGeo, legMat);
      leg.position.set(lx, ly, lz);
      tableGroup.add(leg);
    }

    // ── Number Circle on Table ──
    const NUMBER_COUNT = 12;
    const NUMBER_RADIUS = 1.6;
    const numberMeshes = [];

    function createNumberTexture(num) {
      const canvas = document.createElement('canvas');
      canvas.width = 128;
      canvas.height = 128;
      const ctx = canvas.getContext('2d');
      ctx.clearRect(0, 0, 128, 128);
      // Glow circle background
      const grd = ctx.createRadialGradient(64, 64, 10, 64, 64, 60);
      grd.addColorStop(0, 'rgba(255, 140, 30, 0.15)');
      grd.addColorStop(1, 'rgba(255, 100, 10, 0)');
      ctx.fillStyle = grd;
      ctx.beginPath();
      ctx.arc(64, 64, 60, 0, Math.PI * 2);
      ctx.fill();
      // Number text
      ctx.font = 'bold 72px Georgia';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillStyle = '#ffcc55';
      ctx.shadowColor = 'rgba(255, 160, 40, 1)';
      ctx.shadowBlur = 20;
      ctx.fillText(String(num), 64, 64);
      return new THREE.CanvasTexture(canvas);
    }

    for (let i = 0; i < NUMBER_COUNT; i++) {
      const angle = (i / NUMBER_COUNT) * Math.PI * 2 - Math.PI / 2; // start from top
      const tex = createNumberTexture(i + 1);
      const mat = new THREE.MeshBasicMaterial({
        map: tex,
        transparent: true,
        blending: THREE.AdditiveBlending,
        depthWrite: false,
        side: THREE.DoubleSide,
      });
      const mesh = new THREE.Mesh(new THREE.PlaneGeometry(0.55, 0.55), mat);
      mesh.rotation.x = -Math.PI / 2;
      mesh.position.set(
        Math.cos(angle) * NUMBER_RADIUS,
        0.06,
        Math.sin(angle) * NUMBER_RADIUS
      );
      mesh.userData.number = i + 1;
      mesh.userData.angle = angle;
      scene.add(mesh);
      numberMeshes.push(mesh);
    }

    // ── Spinning Top (scaled down to ~40%) ──
    const topGroup = new THREE.Group();
    topGroup.position.y = 0.05;
    topGroup.scale.set(0.4, 0.4, 0.4);
    scene.add(topGroup);

    const points = [];
    points.push(new THREE.Vector2(0, 0));
    points.push(new THREE.Vector2(0.02, 0.05));
    points.push(new THREE.Vector2(0.06, 0.15));
    points.push(new THREE.Vector2(0.15, 0.35));
    points.push(new THREE.Vector2(0.35, 0.55));
    points.push(new THREE.Vector2(0.55, 0.7));
    points.push(new THREE.Vector2(0.7, 0.8));
    points.push(new THREE.Vector2(0.8, 0.88));
    points.push(new THREE.Vector2(0.82, 0.92));
    points.push(new THREE.Vector2(0.83, 0.95));
    points.push(new THREE.Vector2(0.82, 0.98));
    points.push(new THREE.Vector2(0.78, 1.02));
    points.push(new THREE.Vector2(0.65, 1.08));
    points.push(new THREE.Vector2(0.45, 1.15));
    points.push(new THREE.Vector2(0.3, 1.22));
    points.push(new THREE.Vector2(0.15, 1.4));
    points.push(new THREE.Vector2(0.1, 1.6));
    points.push(new THREE.Vector2(0.08, 1.9));
    points.push(new THREE.Vector2(0.09, 2.2));
    points.push(new THREE.Vector2(0.12, 2.5));
    points.push(new THREE.Vector2(0.15, 2.7));
    points.push(new THREE.Vector2(0.18, 2.85));
    points.push(new THREE.Vector2(0.2, 2.95));
    points.push(new THREE.Vector2(0.2, 3.05));
    points.push(new THREE.Vector2(0.18, 3.15));
    points.push(new THREE.Vector2(0.14, 3.25));
    points.push(new THREE.Vector2(0.08, 3.35));
    points.push(new THREE.Vector2(0.03, 3.45));
    points.push(new THREE.Vector2(0, 3.5));

    const topGeo = new THREE.LatheGeometry(points, 128);
    topGeo.computeVertexNormals();

    const cubeRT = new THREE.WebGLCubeRenderTarget(512);
    const cubeCamera = new THREE.CubeCamera(0.1, 100, cubeRT);
    scene.add(cubeCamera);

    const topMat = new THREE.MeshPhysicalMaterial({
      color: 0xD4722A,
      metalness: 1.0,
      roughness: 0.05,
      envMap: cubeRT.texture,
      envMapIntensity: 3.0,
      clearcoat: 1.0,
      clearcoatRoughness: 0.02,
      reflectivity: 1.0,
      ior: 2.5,
    });

    const topMesh = new THREE.Mesh(topGeo, topMat);
    topGroup.add(topMesh);

    const ringMesh = new THREE.Mesh(
      new THREE.TorusGeometry(0.83, 0.03, 24, 128),
      new THREE.MeshPhysicalMaterial({
        color: 0xE88530,
        metalness: 1.0,
        roughness: 0.03,
        emissive: 0xcc6600,
        emissiveIntensity: 0.3,
        envMap: cubeRT.texture,
        envMapIntensity: 2.5,
        clearcoat: 1.0,
        clearcoatRoughness: 0.01,
      })
    );
    ringMesh.rotation.x = Math.PI / 2;
    ringMesh.position.y = 0.95;
    topGroup.add(ringMesh);

    // ── Particle System ──
    const PARTICLE_COUNT = 300;
    const particleGeo = new THREE.BufferGeometry();
    const pPositions = new Float32Array(PARTICLE_COUNT * 3);
    const pVelocities = new Float32Array(PARTICLE_COUNT * 3);
    const pLifetimes = new Float32Array(PARTICLE_COUNT);
    const pMaxLifetimes = new Float32Array(PARTICLE_COUNT);

    function resetParticle(i) {
      const angle = Math.random() * Math.PI * 2;
      const r = 0.32 + Math.random() * 0.05; // scaled to match smaller top
      pPositions[i * 3] = Math.cos(angle) * r;
      pPositions[i * 3 + 1] = 0.4 + Math.random() * 0.1; // lower to match scaled top
      pPositions[i * 3 + 2] = Math.sin(angle) * r;
      const speed = 0.5 + Math.random() * 2.5;
      pVelocities[i * 3] = Math.cos(angle) * speed + (Math.random() - 0.5) * 0.5;
      pVelocities[i * 3 + 1] = 0.2 + Math.random() * 1.5;
      pVelocities[i * 3 + 2] = Math.sin(angle) * speed + (Math.random() - 0.5) * 0.5;
      pMaxLifetimes[i] = 0.5 + Math.random() * 1.5;
      pLifetimes[i] = pMaxLifetimes[i];
    }

    for (let i = 0; i < PARTICLE_COUNT; i++) {
      resetParticle(i);
      pLifetimes[i] = Math.random() * pMaxLifetimes[i];
    }

    particleGeo.setAttribute('position', new THREE.BufferAttribute(pPositions, 3));

    const sparkCanvas = document.createElement('canvas');
    sparkCanvas.width = 64;
    sparkCanvas.height = 64;
    const sparkCtx = sparkCanvas.getContext('2d');
    const grad = sparkCtx.createRadialGradient(32, 32, 0, 32, 32, 32);
    grad.addColorStop(0, 'rgba(255, 200, 80, 1)');
    grad.addColorStop(0.2, 'rgba(255, 140, 40, 0.8)');
    grad.addColorStop(0.5, 'rgba(255, 80, 10, 0.3)');
    grad.addColorStop(1, 'rgba(255, 40, 0, 0)');
    sparkCtx.fillStyle = grad;
    sparkCtx.fillRect(0, 0, 64, 64);

    const particleMat = new THREE.PointsMaterial({
      map: new THREE.CanvasTexture(sparkCanvas),
      size: 0.15,
      sizeAttenuation: true,
      transparent: true,
      blending: THREE.AdditiveBlending,
      depthWrite: false,
      color: 0xff9930,
    });

    const particles = new THREE.Points(particleGeo, particleMat);
    scene.add(particles);

    // ── Trail Streaks ──
    const trails = [];
    const trailGroup = new THREE.Group();
    scene.add(trailGroup);

    for (let i = 0; i < 40; i++) {
      const len = 0.3 + Math.random() * 1.2;
      const mat = new THREE.MeshBasicMaterial({
        color: new THREE.Color().setHSL(0.07 + Math.random() * 0.05, 1.0, 0.5 + Math.random() * 0.3),
        transparent: true,
        opacity: 0.4 + Math.random() * 0.5,
        blending: THREE.AdditiveBlending,
        depthWrite: false,
        side: THREE.DoubleSide,
      });
      const trail = new THREE.Mesh(new THREE.PlaneGeometry(0.02, len), mat);
      const angle = Math.random() * Math.PI * 2;
      const dist = 2.5 + Math.random() * 5;
      trail.position.set(Math.cos(angle) * dist, 0.3 + Math.random() * 3, Math.sin(angle) * dist);
      trail.rotation.z = angle + Math.PI / 2 + (Math.random() - 0.5) * 0.5;
      trail.userData = { angle, dist, speed: 0.1 + Math.random() * 0.4, baseY: trail.position.y, phase: Math.random() * Math.PI * 2 };
      trailGroup.add(trail);
      trails.push(trail);
    }

    // ── Decorative Orbit Circles ──
    const circleGroup = new THREE.Group();
    circleGroup.position.set(-3.5, 3, 0);
    scene.add(circleGroup);

    const c1 = new THREE.Mesh(
      new THREE.RingGeometry(0.45, 0.48, 64),
      new THREE.MeshBasicMaterial({ color: 0xff8833, transparent: true, opacity: 0.6, side: THREE.DoubleSide, blending: THREE.AdditiveBlending })
    );
    circleGroup.add(c1);

    const c2 = new THREE.Mesh(
      new THREE.RingGeometry(0.55, 0.57, 64),
      new THREE.MeshBasicMaterial({ color: 0xff8833, transparent: true, opacity: 0.4, side: THREE.DoubleSide, blending: THREE.AdditiveBlending })
    );
    c2.rotation.x = 0.3;
    c2.rotation.y = 0.5;
    circleGroup.add(c2);

    const orbitDot = new THREE.Mesh(
      new THREE.SphereGeometry(0.04, 8, 8),
      new THREE.MeshBasicMaterial({ color: 0xffaa55 })
    );
    circleGroup.add(orbitDot);

    // ── Cursor Follower ──
    const cursorDot = document.getElementById('cursor-dot');
    document.addEventListener('mousemove', (e) => {
      cursorDot.style.left = e.clientX + 'px';
      cursorDot.style.top = e.clientY + 'px';
    });

    // ── Game Logic ──
    function startSpin() {
      gameState = 'spinning';
      spinSpeed = 12 + Math.random() * 6; // 12-18 rad/s
      wobbleAmount = 0.02;
      fallProgress = 0;
      resultShown = false;
      spinStartTime = clock.getElapsedTime();

      // Pick random target number (1-12) and its angle
      const targetNum = Math.floor(Math.random() * 12);
      targetFallAngle = (targetNum / NUMBER_COUNT) * Math.PI * 2 - Math.PI / 2;

      // Reset top upright
      topGroup.position.y = 0.05;
      topGroup.rotation.x = 0;
      topGroup.rotation.z = 0;

      // Hide UI
      spinBtn.classList.add('hidden');
      resultDiv.classList.remove('visible');

      // Show particles
      particles.visible = true;
    }

    function resetGame() {
      gameState = 'idle';
      spinSpeed = 0;
      fallProgress = 0;
      wobbleAmount = 0.03;
      topGroup.rotation.x = 0;
      topGroup.rotation.z = 0;
      topGroup.position.y = 0.05;

      resultDiv.classList.remove('visible');
      spinBtn.classList.remove('hidden');
      particles.visible = true;
    }

    function getResultNumber() {
      // The top falls toward targetFallAngle, find closest number
      let bestDist = Infinity;
      let bestNum = 1;
      for (const nm of numberMeshes) {
        let diff = Math.abs(nm.userData.angle - targetFallAngle);
        if (diff > Math.PI) diff = Math.PI * 2 - diff;
        if (diff < bestDist) {
          bestDist = diff;
          bestNum = nm.userData.number;
        }
      }
      return bestNum;
    }

    function showResult() {
      if (resultShown) return;
      resultShown = true;
      const num = getResultNumber();
      resultNumber.textContent = num;
      resultDiv.classList.add('visible');
    }

    spinBtn.addEventListener('click', startSpin);
    spinAgainBtn.addEventListener('click', resetGame);


    // ── Camera targets ──
    const camIdlePos = new THREE.Vector3(0, 6, 7);
    const camSpinPos = new THREE.Vector3(0, 8, 5);
    const camTarget = new THREE.Vector3();
    const camCurrentPos = new THREE.Vector3().copy(camIdlePos);

    // ── Animation Loop ──
    const clock = new THREE.Clock();
    let envUpdateCounter = 0;

    function animate() {
      requestAnimationFrame(animate);
      const dt = Math.min(clock.getDelta(), 0.05);
      const elapsed = clock.getElapsedTime();

      // ── Game State Machine ──
      if (gameState === 'idle') {
        // Gentle idle wobble, no spin
        topGroup.rotation.y += 0.3 * dt;
        topGroup.rotation.x = Math.sin(elapsed * 0.8) * wobbleAmount;
        topGroup.rotation.z = Math.cos(elapsed * 1.1) * wobbleAmount;
        camTarget.copy(camIdlePos);
        particles.visible = false;

      } else if (gameState === 'spinning') {
        // Fast spin, minimal wobble
        topGroup.rotation.y += spinSpeed * dt;
        topGroup.rotation.x = Math.sin(elapsed * 2) * 0.01;
        topGroup.rotation.z = Math.cos(elapsed * 2.5) * 0.01;
        camTarget.copy(camSpinPos);

        // After 1.5s of full speed, start slowing
        if (elapsed - spinStartTime > 1.5) {
          gameState = 'slowing';
        }

      } else if (gameState === 'slowing') {
        // Decelerate with strong friction
        spinSpeed *= Math.pow(0.3, dt); // exponential decay, halves in ~1s
        topGroup.rotation.y += spinSpeed * dt;

        // Wobble increases as speed decreases
        const slowRatio = Math.max(0, 1 - spinSpeed / 12);
        wobbleAmount = 0.02 + slowRatio * 0.18;
        topGroup.rotation.x = Math.sin(elapsed * 1.5) * wobbleAmount;
        topGroup.rotation.z = Math.cos(elapsed * 2.0) * wobbleAmount;

        camTarget.copy(camSpinPos);

        // Transition to falling when slow enough
        if (spinSpeed < 1.0) {
          gameState = 'falling';
          fallProgress = 0;
        }

      } else if (gameState === 'falling') {
        // Top tilts and falls toward targetFallAngle
        fallProgress += dt * 1.0; // takes ~1s to fall
        fallProgress = Math.min(fallProgress, 1);

        // Ease-in for fall (accelerating tilt)
        const eased = fallProgress * fallProgress;
        const tiltAmount = eased * (Math.PI / 3.5); // ~51 degrees

        // Apply tilt in the direction of targetFallAngle
        topGroup.rotation.x = Math.sin(targetFallAngle) * tiltAmount;
        topGroup.rotation.z = -Math.cos(targetFallAngle) * tiltAmount;

        // Slow residual spin
        topGroup.rotation.y += spinSpeed * dt * (1 - fallProgress);
        spinSpeed *= 0.95;

        // Lower the top slightly as it falls
        topGroup.position.y = 0.05 - eased * 0.25;

        // Camera follows the fall direction
        const fallDirX = Math.cos(targetFallAngle) * 3;
        const fallDirZ = Math.sin(targetFallAngle) * 3;
        camTarget.set(fallDirX + 1, 5, fallDirZ + 5);

        particles.visible = false;

        if (fallProgress >= 1) {
          gameState = 'result';
          showResult();
        }

      } else if (gameState === 'result') {
        // Hold position
        const fallDirX = Math.cos(targetFallAngle) * 2;
        const fallDirZ = Math.sin(targetFallAngle) * 2;
        camTarget.set(fallDirX + 0.5, 5, fallDirZ + 5);
      }

      // ── Smooth Camera ──
      camCurrentPos.lerp(camTarget, dt * 2);
      camera.position.copy(camCurrentPos);
      camera.lookAt(0, 1, 0);

      // ── Light flicker ──
      mainLight.intensity = 12 + Math.sin(elapsed * 3) * 2;

      // ── Particles ──
      if (particles.visible) {
        const posAttr = particleGeo.getAttribute('position');
        for (let i = 0; i < PARTICLE_COUNT; i++) {
          pLifetimes[i] -= dt;
          if (pLifetimes[i] <= 0) {
            resetParticle(i);
          } else {
            pPositions[i * 3] += pVelocities[i * 3] * dt;
            pPositions[i * 3 + 1] += pVelocities[i * 3 + 1] * dt;
            pPositions[i * 3 + 2] += pVelocities[i * 3 + 2] * dt;
            pVelocities[i * 3 + 1] -= 2.0 * dt;
          }
        }
        posAttr.needsUpdate = true;
      }

      // ── Trail streaks ──
      for (const trail of trails) {
        const d = trail.userData;
        d.angle += d.speed * dt;
        trail.position.x = Math.cos(d.angle) * d.dist;
        trail.position.z = Math.sin(d.angle) * d.dist;
        trail.position.y = d.baseY + Math.sin(elapsed + d.phase) * 0.3;
        trail.rotation.z = d.angle + Math.PI / 2;
        trail.material.opacity = 0.3 + Math.sin(elapsed * 2 + d.phase) * 0.3;
      }

      // ── Orbit circles ──
      circleGroup.rotation.z = elapsed * 0.3;
      orbitDot.position.x = Math.cos(elapsed * 1.2) * 0.46;
      orbitDot.position.y = Math.sin(elapsed * 1.2) * 0.46;

      // ── Number glow pulse ──
      for (const nm of numberMeshes) {
        nm.material.opacity = 0.7 + Math.sin(elapsed * 1.5 + nm.userData.number) * 0.3;
      }

      // ── Env map update ──
      envUpdateCounter++;
      if (envUpdateCounter % 10 === 0) {
        topMesh.visible = false;
        ringMesh.visible = false;
        cubeCamera.position.copy(topGroup.position);
        cubeCamera.position.y = 1.5;
        cubeCamera.update(renderer, scene);
        topMesh.visible = true;
        ringMesh.visible = true;
      }

      composer.render();
    }

    animate();

    // ── Resize ──
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
      composer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
